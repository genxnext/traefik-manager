<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Traefik Manager</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/gxnt-traefik-manager-logo.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            margin: 0 auto 16px;
            object-fit: cover;
        }
        .login-card h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
        .login-card .sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }
        .form-label { font-size: 13px; font-weight: 500; color: #374151; }
        .form-control {
            border-radius: 8px; border-color: #d1d5db; font-size: 14px; padding: 10px 14px;
        }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        .btn-login-removed { display: none; }
        .error-box {
            background: #fef2f2; border: 1px solid #fecaca;
            color: #dc2626; border-radius: 8px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 16px;
        }
        .footer-note { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center">
            <img class="brand-icon" src="{{ url_for('static', filename='img/gxnt-traefik-manager-logo.svg') }}" alt="GXNT Traefik Manager logo">
            <h1>Traefik Manager</h1>
            <p class="sub">Sign in to manage your Traefik configuration</p>
        </div>

        {% if error %}
        <div class="error-box"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="admin" autocomplete="username" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <p class="footer-note">Default credentials: <strong>admin / admin</strong> — you'll be prompted to change on first login.<br>Open-source by <strong>GXNT TECH PVT LTD</strong>.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
