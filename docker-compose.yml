services:
  traefik-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gxnt-traefik-manager
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-8090}:8090"
    environment:
      ETCD_URL: "${ETCD_URL:-http://host.docker.internal:2379}"
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:-change-me-in-production}"
      TRAEFIK_MANAGER_DB_PATH: "/app/data/traefik_manager.db"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/api/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
